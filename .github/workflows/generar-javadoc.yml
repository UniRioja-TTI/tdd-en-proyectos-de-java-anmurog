name: Generar y Publicar Javadoc

on:
  push:
    branches:
      - stable

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Ejecutar Javadoc
        run: javadoc -d documentacion -sourcepath src/main/java -subpackages com.tt1

      - name: Subir a GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'documentacion'

      - name: Desplegar Web
        uses: actions/deploy-pages@v4
